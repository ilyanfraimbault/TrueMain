name: Build and Push Docker Images

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/truemain-api
  IMAGE_INGESTOR: ghcr.io/${{ github.repository_owner }}/truemain-ingestor

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_API }}:latest

      - name: Build and push Ingestor
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Ingestor/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_INGESTOR }}:latest
