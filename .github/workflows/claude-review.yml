name: Claude Code Review

on:
  pull_request:
    # Only review PRs targeting the long-lived branches.
    branches: [master, develop]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude Review
    runs-on: ubuntu-24.04
    # Skip draft PRs; marking ready for review re-triggers the workflow.
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Claude review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO : ${{ github.repository }}
            PR : ${{ github.event.pull_request.number }}

            Relis le diff de cette pull request et laisse une review.
            Concentre-toi sur :
            - les bugs et erreurs de logique
            - les problèmes de sécurité
            - la qualité et la lisibilité du code
            - les tests manquants

            Pour chaque point précis et actionnable, poste un commentaire inline
            sur la ligne concernée.

            Termine TOUJOURS par un unique commentaire de synthèse sur la PR,
            posté avec `gh pr comment`, même quand il n'y a rien à corriger. Dans
            ce cas, dis-le explicitement — par ex. « ✅ Relu, rien à signaler »
            suivi d'une phrase de justification. Ne termine JAMAIS la review sans
            avoir posté ce commentaire de synthèse.

            Sois concis et n'invente pas de problèmes.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
