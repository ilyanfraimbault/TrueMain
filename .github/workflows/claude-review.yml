name: Claude Code Review

on:
  pull_request:
    # Automatic review on the long-lived branches. The earlier on-demand trigger
    # (`review_requested` for `claude[bot]`, #387) was unusable — a GitHub App
    # bot can't be requested as a PR reviewer — so it never fired.
    branches: [master, develop]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude Review
    runs-on: ubuntu-24.04
    # Skip drafts; marking a PR ready for review re-triggers the workflow.
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Claude review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Dependabot ouvre des PR en tant que bot ; sans cette liste l'action
          # échoue avec « Workflow initiated by non-human actor ».
          allowed_bots: "dependabot[bot]"
          prompt: |
            REPO : ${{ github.repository }}
            PR : ${{ github.event.pull_request.number }}

            Cette pull request vient d'être ouverte ou mise à jour. Relis le
            diff et soumets une review FORMELLE (pas un simple commentaire).
            Concentre-toi sur :
            - les bugs et erreurs de logique
            - les problèmes de sécurité
            - la qualité et la lisibilité du code
            - les tests manquants

            Déroulé :
            1. Pour chaque point précis et actionnable, poste un commentaire
               inline sur la ligne concernée, en le classant BLOQUANT ou NON
               BLOQUANT :
               - BLOQUANT = bug, faille de sécurité, test critique cassé ou
                 manquant, régression, erreur de logique.
               - NON BLOQUANT = style, lisibilité, nit, « on pourrait aussi… »,
                 défense en profondeur, préférence, micro-optimisation.
            2. Termine TOUJOURS par une review formelle soumise avec
               `gh pr review`, jamais par un simple `gh pr comment`. Le verdict
               dépend UNIQUEMENT des points BLOQUANTS :
               - s'il n'y a AUCUN point bloquant, APPROUVE — même s'il reste des
                 suggestions non bloquantes :
                 `gh pr review ${{ github.event.pull_request.number }} --approve --body "..."`
                 en listant le cas échéant les points sous
                 « Suggestions (non bloquantes) : … ».
               - s'il y a au moins un point BLOQUANT, DEMANDE DES CHANGEMENTS :
                 `gh pr review ${{ github.event.pull_request.number }} --request-changes --body "..."`
                 avec une synthèse des points bloquants.

            Règles :
            - Ne demande JAMAIS de changements pour des points uniquement
              stylistiques, redondants ou de préférence.
            - Ne ré-évoque pas une remarque déjà traitée ou correspondant à une
              décision intentionnelle documentée (commentaire de code, README,
              réponse dans un fil de discussion).
            - Soumettre une review formelle à chaque run est volontaire : une
              approbation explicite évite qu'un run « silencieux » soit pris pour
              un échec. Sois concis et n'invente pas de problèmes.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
