name: Claude Code Review

on:
  pull_request:
    # On-demand only: the review runs when Claude is explicitly assigned as a
    # reviewer, not on every push. Re-request a review to re-run it.
    types: [review_requested]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude Review
    runs-on: ubuntu-24.04
    # Only when *Claude* is the requested reviewer — assigning a human reviewer
    # must not trigger this. `claude[bot]` is the Claude GitHub App's bot user.
    if: github.event.requested_reviewer.login == 'claude[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Claude review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO : ${{ github.repository }}
            PR : ${{ github.event.pull_request.number }}

            Tu as été assigné comme reviewer sur cette pull request. Relis le
            diff et soumets une review FORMELLE (pas un simple commentaire).
            Concentre-toi sur :
            - les bugs et erreurs de logique
            - les problèmes de sécurité
            - la qualité et la lisibilité du code
            - les tests manquants

            Déroulé :
            1. Pour chaque point précis et actionnable, poste un commentaire
               inline sur la ligne concernée.
            2. Termine TOUJOURS par une review formelle soumise avec
               `gh pr review`, jamais par un simple `gh pr comment` :
               - s'il n'y a RIEN à corriger, APPROUVE :
                 `gh pr review ${{ github.event.pull_request.number }} --approve --body "..."`
                 avec une courte justification (par ex.
                 « ✅ Relu, rien à signaler — <raison> »).
               - s'il y a des points à corriger, DEMANDE DES CHANGEMENTS :
                 `gh pr review ${{ github.event.pull_request.number }} --request-changes --body "..."`
                 avec une synthèse des points soulevés.

            N'approuve QUE si tu n'as vraiment rien à signaler. Sois concis et
            n'invente pas de problèmes.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
