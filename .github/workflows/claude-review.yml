name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude Review
    runs-on: ubuntu-24.04
    # Skip draft PRs; marking ready for review re-triggers the workflow.
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Claude review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Relis le diff de cette pull request et laisse une review.
            Concentre-toi sur :
            - les bugs et erreurs de logique
            - les problèmes de sécurité
            - la qualité et la lisibilité du code
            - les tests manquants
            Poste des commentaires inline sur les lignes concernées et termine
            par un court résumé. Sois concis et n'invente pas de problèmes :
            s'il n'y a rien à signaler, dis-le simplement.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(git diff:*),Bash(git log:*)"
