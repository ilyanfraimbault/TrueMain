name: Publish Docker Images

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

env:
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/truemain-api
  IMAGE_INGESTOR: ghcr.io/${{ github.repository_owner }}/truemain-ingestor
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/truemain-web

jobs:
  publish:
    name: Publish Release Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: backend/Api/Dockerfile
          push: true
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          tags: |
            ${{ env.IMAGE_API }}:${{ github.event.release.tag_name }}
            ${{ env.IMAGE_API }}:latest

      - name: Build and push Ingestor image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: backend/Ingestor/Dockerfile
          push: true
          cache-from: type=gha,scope=ingestor
          cache-to: type=gha,mode=max,scope=ingestor
          tags: |
            ${{ env.IMAGE_INGESTOR }}:${{ github.event.release.tag_name }}
            ${{ env.IMAGE_INGESTOR }}:latest

      - name: Build and push Web image
        uses: docker/build-push-action@v7
        with:
          context: ./web
          file: web/Dockerfile
          push: true
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          tags: |
            ${{ env.IMAGE_WEB }}:${{ github.event.release.tag_name }}
            ${{ env.IMAGE_WEB }}:latest
