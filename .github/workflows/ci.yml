name: CI

on:
  pull_request:
  push:
    branches:
      - develop
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'global.json', 'NuGet.config') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore solution
        run: dotnet restore TrueMain.sln

      - name: Build solution
        run: dotnet build TrueMain.sln --configuration Release --no-restore

      - name: Test solution
        run: dotnet test TrueMain.sln --configuration Release --no-build --verbosity normal

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: truemain-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: truemain-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck Nuxt app
        run: npm run typecheck

      - name: Build Nuxt app
        run: npm run build

  compose-config:
    name: Compose Config Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate development compose file
        env:
          POSTGRES_USER: truemain
          POSTGRES_PASSWORD: truemain
          POSTGRES_DB: truemain
          RIOT_API_KEY: RGAPI-REPLACE_ME
          PGADMIN_DEFAULT_EMAIL: admin@truemain.dev
          PGADMIN_DEFAULT_PASSWORD: admin
        run: docker compose -f compose.yaml config

      - name: Validate dev watch compose file
        env:
          POSTGRES_USER: truemain
          POSTGRES_PASSWORD: truemain
          POSTGRES_DB: truemain
          RIOT_API_KEY: RGAPI-REPLACE_ME
          PGADMIN_DEFAULT_EMAIL: admin@truemain.dev
          PGADMIN_DEFAULT_PASSWORD: admin
        run: docker compose -f compose.dev.yaml config

      - name: Validate production compose file
        env:
          POSTGRES_USER: truemain
          POSTGRES_PASSWORD: truemain
          POSTGRES_DB: truemain
          RIOT_API_KEY: RGAPI-REPLACE_ME
          PGADMIN_DEFAULT_EMAIL: admin@truemain.dev
          PGADMIN_DEFAULT_PASSWORD: admin
        run: docker compose -f compose.prod.yaml config

      - name: Validate QA compose file
        env:
          POSTGRES_USER: truemain_qa
          POSTGRES_PASSWORD: truemain_qa
          POSTGRES_DB: truemain_qa
          RIOT_API_KEY: RGAPI-REPLACE_ME_QA
          PGADMIN_DEFAULT_EMAIL: admin@truemain-qa.dev
          PGADMIN_DEFAULT_PASSWORD: admin
        run: docker compose -f compose.qa.yaml config

  docker-build:
    name: Docker Build Sanity (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: API
            file: Api/Dockerfile
            scope: api
          - name: Ingestor
            file: Ingestor/Dockerfile
            scope: ingestor
          - name: Web
            file: truemain-web/Dockerfile
            scope: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: false
          cache-from: type=gha,scope=${{ matrix.scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.scope }}
