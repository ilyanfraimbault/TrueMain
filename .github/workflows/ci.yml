name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - develop
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Build and Test
    runs-on: ubuntu-24.04
    # Skip on draft PRs (marking ready re-triggers the workflow). Always run on
    # develop/master pushes, where github.event.pull_request is null.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/**/*.csproj', 'backend/global.json', 'backend/NuGet.config') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore solution
        run: dotnet restore TrueMain.sln

      - name: Build solution
        run: dotnet build TrueMain.sln --configuration Release --no-restore

      - name: Unit tests
        run: dotnet test tests/TrueMain.UnitTests/TrueMain.UnitTests.csproj --configuration Release --no-build --verbosity normal

      - name: Integration tests
        if: github.event_name == 'pull_request'
        run: dotnet test tests/TrueMain.IntegrationTests/TrueMain.IntegrationTests.csproj --configuration Release --no-build --verbosity normal

  frontend:
    name: Frontend Build and Test (${{ matrix.app }})
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    strategy:
      fail-fast: false
      matrix:
        app: [web, admin]

    defaults:
      run:
        working-directory: ${{ matrix.app }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck Nuxt app
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build Nuxt app
        run: npm run build

  compose-config:
    name: Compose Config Validation
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate development compose file
        env:
          POSTGRES_USER: truemain
          POSTGRES_PASSWORD: truemain
          POSTGRES_DB: truemain
          RIOT_API_KEY: RGAPI-REPLACE_ME
          OPS_API_KEY: ci-ops-api-key-min-32-characters-padding
          PGADMIN_DEFAULT_EMAIL: admin@truemain.dev
          PGADMIN_DEFAULT_PASSWORD: admin
          ADMIN_SESSION_PASSWORD: ci-admin-session-min-32-characters-padding
          ADMIN_USERNAME: truemain
          ADMIN_PASSWORD: truemain
          MONGO_USER: truemain
          MONGO_PASSWORD: truemain
          UMAMI_DB_PASSWORD: truemain
          UMAMI_APP_SECRET: ci-umami-app-secret-min-32-characters
        run: docker compose -f compose.yaml config

      - name: Validate dev watch compose file
        env:
          POSTGRES_USER: truemain
          POSTGRES_PASSWORD: truemain
          POSTGRES_DB: truemain
          RIOT_API_KEY: RGAPI-REPLACE_ME
          OPS_API_KEY: ci-ops-api-key-min-32-characters-padding
          PGADMIN_DEFAULT_EMAIL: admin@truemain.dev
          PGADMIN_DEFAULT_PASSWORD: admin
          ADMIN_SESSION_PASSWORD: ci-admin-session-min-32-characters-padding
          ADMIN_USERNAME: truemain
          ADMIN_PASSWORD: truemain
          MONGO_USER: truemain
          MONGO_PASSWORD: truemain
        run: docker compose -f compose.dev.yaml config

      - name: Validate production compose file
        env:
          POSTGRES_USER: truemain
          POSTGRES_PASSWORD: truemain
          POSTGRES_DB: truemain
          RIOT_API_KEY: RGAPI-REPLACE_ME
          OPS_API_KEY: ci-ops-api-key-min-32-characters-padding
          PGADMIN_DEFAULT_EMAIL: admin@truemain.dev
          PGADMIN_DEFAULT_PASSWORD: admin
          ADMIN_SESSION_PASSWORD: ci-admin-session-min-32-characters-padding
          ADMIN_USERNAME: truemain
          ADMIN_PASSWORD: truemain
          MONGO_USER: truemain
          MONGO_PASSWORD: truemain
          UMAMI_DB_PASSWORD: truemain
          UMAMI_APP_SECRET: ci-umami-app-secret-min-32-characters
        run: docker compose -f compose.prod.yaml config

      - name: Validate preprod compose file
        env:
          POSTGRES_USER: truemain_preprod
          POSTGRES_PASSWORD: truemain_preprod
          POSTGRES_DB: truemain_preprod
          RIOT_API_KEY: RGAPI-REPLACE_ME_PREPROD
          OPS_API_KEY: ci-ops-api-key-min-32-characters-padding
          PGADMIN_DEFAULT_EMAIL: admin@truemain-preprod.dev
          PGADMIN_DEFAULT_PASSWORD: admin
          ADMIN_SESSION_PASSWORD: ci-admin-session-min-32-characters-padding
          ADMIN_USERNAME: truemain
          ADMIN_PASSWORD: truemain
          MONGO_USER: truemain_preprod
          MONGO_PASSWORD: truemain_preprod
          UMAMI_DB_PASSWORD: truemain_preprod
          UMAMI_APP_SECRET: ci-umami-app-secret-min-32-characters
        run: docker compose -f compose.preprod.yaml config

  docker-build:
    name: Docker Build Sanity (${{ matrix.name }})
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: API
            context: ./backend
            file: backend/Api/Dockerfile
            scope: api
          - name: Ingestor
            context: ./backend
            file: backend/Ingestor/Dockerfile
            scope: ingestor
          - name: Web
            context: ./web
            file: web/Dockerfile
            scope: web
          - name: Admin
            context: ./admin
            file: admin/Dockerfile
            scope: admin

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          cache-from: type=gha,scope=${{ matrix.scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.scope }}
