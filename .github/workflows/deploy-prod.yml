name: Deploy Production

on:
  push:
    branches: ["master"]

permissions:
  contents: read
  packages: write

env:
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/truemain-api
  IMAGE_INGESTOR: ghcr.io/${{ github.repository_owner }}/truemain-ingestor

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore .NET dependencies for EF bundle
        run: |
          dotnet restore Api/Api.csproj --runtime linux-x64
          dotnet restore Data/Data.csproj --runtime linux-x64

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Build EF migration bundle
        run: |
          mkdir -p artifacts
          ~/.dotnet/tools/dotnet-ef migrations bundle \
            --project Data/Data.csproj \
            --startup-project Api/Api.csproj \
            --configuration Release \
            --output artifacts/efbundle \
            --self-contained \
            --runtime linux-x64

      - name: Upload EF migration bundle
        uses: actions/upload-artifact@v4
        with:
          name: efbundle
          path: artifacts/efbundle
          if-no-files-found: error

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_API }}:latest

      - name: Build and push Ingestor
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Ingestor/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_INGESTOR }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download EF migration bundle
        uses: actions/download-artifact@v4
        with:
          name: efbundle
          path: artifacts

      - name: Copy compose.prod.yaml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: compose.prod.yaml
          target: /opt/truemain

      - name: Copy EF migration bundle to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: artifacts/efbundle
          target: /opt/truemain

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -euo pipefail
            mkdir -p /opt/truemain
            cd /opt/truemain
            export COMPOSE_PROJECT_NAME=truemain

            if [ -n "${{ secrets.GHCR_PAT }}" ]; then
              echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            fi

            if [ ! -f /opt/truemain/.env.prod ]; then
              echo "/opt/truemain/.env.prod is missing"
              exit 1
            fi

            if [ -f /opt/truemain/efbundle ]; then
              EFBUNDLE_PATH=/opt/truemain/efbundle
            elif [ -f /opt/truemain/artifacts/efbundle ]; then
              EFBUNDLE_PATH=/opt/truemain/artifacts/efbundle
            else
              echo "EF bundle is missing"
              exit 1
            fi

            chmod +x "$EFBUNDLE_PATH"
            docker compose --env-file /opt/truemain/.env.prod -f /opt/truemain/compose.prod.yaml pull
            docker compose --env-file /opt/truemain/.env.prod -f /opt/truemain/compose.prod.yaml up -d postgres

            POSTGRES_CONTAINER="$(docker compose --env-file /opt/truemain/.env.prod -f /opt/truemain/compose.prod.yaml ps -q postgres)"
            if [ -z "$POSTGRES_CONTAINER" ]; then
              echo "Could not resolve postgres container id"
              exit 1
            fi

            for i in $(seq 1 30); do
              STATUS="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}unknown{{end}}' "$POSTGRES_CONTAINER" 2>/dev/null || true)"
              if [ "$STATUS" = "healthy" ]; then
                break
              fi
              sleep 2
            done

            STATUS="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}unknown{{end}}' "$POSTGRES_CONTAINER" 2>/dev/null || true)"
            if [ "$STATUS" != "healthy" ]; then
              echo "Postgres is not healthy (status=$STATUS)"
              exit 1
            fi

            set -a
            . /opt/truemain/.env.prod
            set +a
            docker run --rm \
              --network "${COMPOSE_PROJECT_NAME}_truemain_internal" \
              -v /opt/truemain:/opt/truemain \
              mcr.microsoft.com/dotnet/runtime-deps:10.0 \
              "$EFBUNDLE_PATH" \
              --connection "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
            docker compose --env-file /opt/truemain/.env.prod -f /opt/truemain/compose.prod.yaml up -d api ingestor --remove-orphans
            docker image prune -f
