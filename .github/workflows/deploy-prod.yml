name: Deploy Production

on:
  push:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/truemain-api
  IMAGE_INGESTOR: ghcr.io/${{ github.repository_owner }}/truemain-ingestor

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore .NET dependencies (linux-x64)
        run: |
          dotnet restore Api/Api.csproj --runtime linux-x64
          dotnet restore Data/Data.csproj --runtime linux-x64

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Build EF migration bundle
        env:
          ConnectionStrings__TrueMain: Host=localhost;Port=5432;Database=truemain;Username=truemain;Password=truemain
        run: |
          mkdir -p artifacts
          ~/.dotnet/tools/dotnet-ef migrations bundle \
            --project Data/Data.csproj \
            --startup-project Api/Api.csproj \
            --configuration Release \
            --output artifacts/efbundle \
            --self-contained \
            --runtime linux-x64

      - name: Upload EF migration bundle
        uses: actions/upload-artifact@v4
        with:
          name: efbundle
          path: artifacts/efbundle
          if-no-files-found: error

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Api/Dockerfile
          push: true
          tags: ${{ env.IMAGE_API }}:${{ steps.meta.outputs.image_tag }}

      - name: Build and push Ingestor
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Ingestor/Dockerfile
          push: true
          tags: ${{ env.IMAGE_INGESTOR }}:${{ steps.meta.outputs.image_tag }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify VPS SSH reachability
        run: |
          timeout 15 bash -c "cat < /dev/null > /dev/tcp/${{ secrets.VPS_HOST }}/${{ secrets.VPS_PORT || 22 }}"

      - name: Download EF migration bundle
        uses: actions/download-artifact@v4
        with:
          name: efbundle
          path: artifacts

      - name: Copy compose.prod.yaml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 60s
          command_timeout: 2m
          source: compose.prod.yaml
          target: /opt/truemain

      - name: Copy EF migration bundle to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 60s
          command_timeout: 2m
          source: artifacts/efbundle
          target: /opt/truemain

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          script_stop: true
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 60s
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd /opt/truemain
            export COMPOSE_PROJECT_NAME=truemain
            export TRUEMAIN_API_IMAGE=ghcr.io/${{ github.repository_owner }}/truemain-api
            export TRUEMAIN_INGESTOR_IMAGE=ghcr.io/${{ github.repository_owner }}/truemain-ingestor
            export TRUEMAIN_API_TAG=${{ needs.build-and-push.outputs.image_tag }}
            export TRUEMAIN_INGESTOR_TAG=${{ needs.build-and-push.outputs.image_tag }}

            if [ -z "${{ secrets.GHCR_USERNAME }}" ] || [ -z "${{ secrets.GHCR_PAT }}" ]; then
              echo "Missing required secrets GHCR_USERNAME/GHCR_PAT"
              exit 1
            fi
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            if [ -f /opt/truemain/efbundle ]; then
              BUNDLE_PATH="/opt/truemain/efbundle"
            elif [ -f /opt/truemain/artifacts/efbundle ]; then
              BUNDLE_PATH="/opt/truemain/artifacts/efbundle"
            else
              echo "EF bundle not found in /opt/truemain"
              ls -la /opt/truemain
              ls -la /opt/truemain/artifacts || true
              exit 1
            fi
            chmod +x "$BUNDLE_PATH"
            docker compose --env-file /opt/truemain/.env.prod -f /opt/truemain/compose.prod.yaml pull
            docker compose --env-file /opt/truemain/.env.prod -f /opt/truemain/compose.prod.yaml up -d postgres
            set -a
            . /opt/truemain/.env.prod
            set +a
            CONNECTION_STRING="Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
            docker run --rm \
              --network "${COMPOSE_PROJECT_NAME}_truemain_internal" \
              -e "ConnectionStrings__TrueMain=${CONNECTION_STRING}" \
              -v /opt/truemain:/opt/truemain \
              mcr.microsoft.com/dotnet/runtime-deps:10.0 \
              "$BUNDLE_PATH" \
              --connection "${CONNECTION_STRING}"
            docker compose --env-file /opt/truemain/.env.prod -f /opt/truemain/compose.prod.yaml \
              exec -T postgres psql -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -c 'SELECT COUNT(*) FROM "__EFMigrationsHistory";'
            export TRUEMAIN_API_TAG=${{ needs.build-and-push.outputs.image_tag }}
            export TRUEMAIN_INGESTOR_TAG=${{ needs.build-and-push.outputs.image_tag }}
            docker compose --env-file /opt/truemain/.env.prod -f /opt/truemain/compose.prod.yaml up -d api ingestor --remove-orphans
            docker compose --env-file /opt/truemain/.env.prod -f /opt/truemain/compose.prod.yaml ps
            docker image prune -f
