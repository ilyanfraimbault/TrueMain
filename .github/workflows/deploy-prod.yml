name: Deploy Production

on:
  push:
    branches: ["master"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/truemain-api
  IMAGE_INGESTOR: ghcr.io/${{ github.repository_owner }}/truemain-ingestor

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_API }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.IMAGE_API }}:latest

      - name: Build and push Ingestor
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Ingestor/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_INGESTOR }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.IMAGE_INGESTOR }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /opt/truemain
            export TRUEMAIN_API_IMAGE=ghcr.io/${{ github.repository_owner }}/truemain-api
            export TRUEMAIN_INGESTOR_IMAGE=ghcr.io/${{ github.repository_owner }}/truemain-ingestor
            export TRUEMAIN_API_TAG=${{ needs.build-and-push.outputs.image_tag }}
            export TRUEMAIN_INGESTOR_TAG=${{ needs.build-and-push.outputs.image_tag }}

            docker compose --env-file /opt/truemain/.env.prod -f /opt/truemain/compose.prod.yaml pull
            docker compose --env-file /opt/truemain/.env.prod -f /opt/truemain/compose.prod.yaml up -d --remove-orphans
            docker image prune -f
