services:
  postgres:
    image: postgres:17.2
    container_name: truemain-qa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: truemain_qa
      POSTGRES_PASSWORD: truemain_qa
      POSTGRES_DB: truemain_qa
    volumes:
      - truemain_qa_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truemain_qa -d truemain_qa"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - truemain_internal

  api:
    image: ghcr.io/ilyanfraimbault/truemain-api:qa
    container_name: truemain-qa-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__TrueMain: Host=postgres;Port=5432;Database=truemain_qa;Username=truemain_qa;Password=truemain_qa
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"
    networks:
      - truemain_internal

  web:
    image: ghcr.io/ilyanfraimbault/truemain-web:qa
    container_name: truemain-qa-web
    restart: unless-stopped
    environment:
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      NUXT_PUBLIC_API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL:-http://localhost:8081}
    depends_on:
      api:
        condition: service_started
    ports:
      - "3001:3000"
    networks:
      - truemain_internal

  ingestor:
    image: ghcr.io/ilyanfraimbault/truemain-ingestor:qa
    container_name: truemain-qa-ingestor
    restart: unless-stopped
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__TrueMain: Host=postgres;Port=5432;Database=truemain_qa;Username=truemain_qa;Password=truemain_qa
      Riot__ApiKey: ${RIOT_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - truemain_internal

  pgadmin:
    image: dpage/pgadmin4:9.11
    container_name: truemain-qa-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@truemain-qa.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"
    volumes:
      - truemain_qa_pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - truemain_internal

volumes:
  truemain_qa_db_data:
    name: truemain_qa_db_data
  truemain_qa_pgadmin_data:
    name: truemain_qa_pgadmin_data

networks:
  truemain_internal:
    name: truemain_qa_internal
    driver: bridge
