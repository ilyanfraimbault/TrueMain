name: truemain-dev

services:
  postgres:
    image: postgres:17.2
    container_name: truemain-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - truemain_dev_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - truemain_dev_internal

  api:
    build:
      context: ./backend
      dockerfile: Api/Dockerfile.dev
    container_name: truemain-dev-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
      Database__ApplyMigrationsOnStartup: "true"
      ConnectionStrings__TrueMain: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Command Timeout=300
      Ops__ApiKey: ${OPS_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - truemain_dev_api_nuget:/root/.nuget/packages
    develop:
      watch:
        - action: sync
          path: ./backend/Api
          target: /workspace/Api
          ignore:
            - Api.csproj
            - bin/
            - obj/
        - action: sync
          path: ./backend/Core
          target: /workspace/Core
          ignore:
            - Core.csproj
            - bin/
            - obj/
        - action: sync
          path: ./backend/Data
          target: /workspace/Data
          ignore:
            - Data.csproj
            - bin/
            - obj/
        - action: rebuild
          path: ./backend/Api/Api.csproj
        - action: rebuild
          path: ./backend/Core/Core.csproj
        - action: rebuild
          path: ./backend/Data/Data.csproj
        - action: rebuild
          path: ./backend/Directory.Build.props
    networks:
      - truemain_dev_internal

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: truemain-dev-web
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      NUXT_API_BASE_URL: http://api:8080
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./web:/workspace/web
      - truemain_dev_web_node_modules:/workspace/web/node_modules
    develop:
      watch:
        - action: rebuild
          path: ./web/package.json
        - action: rebuild
          path: ./web/package-lock.json
    networks:
      - truemain_dev_internal

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.dev
    container_name: truemain-dev-admin
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      NUXT_OPS_API_BASE_URL: http://api:8080
      NUXT_OPS_KEY: ${OPS_API_KEY}
      NUXT_SESSION_PASSWORD: ${ADMIN_SESSION_PASSWORD}
      NUXT_ADMIN_USERNAME: ${ADMIN_USERNAME:-truemain}
      NUXT_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-truemain}
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3001:3000"
    volumes:
      - ./admin:/workspace/admin
      - truemain_dev_admin_node_modules:/workspace/admin/node_modules
    develop:
      watch:
        - action: rebuild
          path: ./admin/package.json
        - action: rebuild
          path: ./admin/package-lock.json
    networks:
      - truemain_dev_internal

  ingestor:
    build:
      context: ./backend
      dockerfile: Ingestor/Dockerfile.dev
    container_name: truemain-dev-ingestor
    restart: unless-stopped
    environment:
      DOTNET_ENVIRONMENT: Development
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
      ConnectionStrings__TrueMain: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Command Timeout=300
      Riot__ApiKey: ${RIOT_API_KEY}
      Job__Mode: ${INGESTOR_JOB_MODE:-Full}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - truemain_dev_ingestor_nuget:/root/.nuget/packages
    develop:
      watch:
        - action: sync
          path: ./backend/Ingestor
          target: /workspace/Ingestor
          ignore:
            - Ingestor.csproj
            - bin/
            - obj/
        - action: sync
          path: ./backend/Core
          target: /workspace/Core
          ignore:
            - Core.csproj
            - bin/
            - obj/
        - action: sync
          path: ./backend/Data
          target: /workspace/Data
          ignore:
            - Data.csproj
            - bin/
            - obj/
        - action: rebuild
          path: ./backend/Ingestor/Ingestor.csproj
        - action: rebuild
          path: ./backend/Core/Core.csproj
        - action: rebuild
          path: ./backend/Data/Data.csproj
        - action: rebuild
          path: ./backend/Directory.Build.props
    networks:
      - truemain_dev_internal

  pgadmin:
    image: dpage/pgadmin4:9.11
    container_name: truemain-dev-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - truemain_dev_pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - truemain_dev_internal

volumes:
  truemain_dev_db_data:
  truemain_dev_pgadmin_data:
  truemain_dev_api_nuget:
  truemain_dev_ingestor_nuget:
  truemain_dev_web_node_modules:
  truemain_dev_admin_node_modules:

networks:
  truemain_dev_internal:
    driver: bridge
