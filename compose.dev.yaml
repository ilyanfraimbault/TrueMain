name: truemain-dev

services:
  postgres:
    image: postgres:17.2
    container_name: truemain-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - truemain_dev_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - truemain_dev_internal

  # Transaction-pooling connection multiplexer in front of Postgres. The app
  # services connect here (pgbouncer:6432) instead of postgres:5432, so a small,
  # fixed set of real Postgres connections (default_pool_size) serves arbitrarily
  # large Npgsql pools. This is what keeps Postgres' max_connections from ever
  # being exhausted (fixes the recurring "53300 too many clients already", #461).
  # EF migrations must NOT pass through here — see the api's
  # ConnectionStrings__TrueMainMigrations (direct to Postgres).
  pgbouncer:
    image: edoburu/pgbouncer:v1.23.1-p3
    container_name: truemain-dev-pgbouncer
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      # edoburu defaults LISTEN_PORT to 5432 (drop-in for postgres); pin it to
      # 6432 to match the apps' connection strings and the published port.
      LISTEN_PORT: "6432"
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "25"
      MIN_POOL_SIZE: "5"
      RESERVE_POOL_SIZE: "5"
      RESERVE_POOL_TIMEOUT: "3"
      ADMIN_USERS: ${POSTGRES_USER}
    ports:
      # Dev only: publish the pooler on loopback so a host-run API/Ingestor
      # (dotnet run) can reach it at localhost:6432. Prod/QA keep PgBouncer
      # internal to the compose network.
      - "127.0.0.1:6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - truemain_dev_internal

  mongo:
    image: mongo:8.0
    container_name: truemain-dev-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
      # Bind to loopback only: the log/audit store must not be reachable from
      # other hosts on the network. App containers reach it over the compose
      # network ("mongo:27017"), which does not go through this published port.
      - "127.0.0.1:27017:27017"
    volumes:
      - truemain_dev_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - truemain_dev_internal

  api:
    build:
      context: ./backend
      dockerfile: Api/Dockerfile.dev
    container_name: truemain-dev-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
      Database__ApplyMigrationsOnStartup: "true"
      # Runtime queries go through PgBouncer (transaction pooling). No Reset On
      # Close=true: PgBouncer owns connection cleanup in transaction mode, so
      # Npgsql must not send DISCARD ALL on close.
      ConnectionStrings__TrueMain: Host=pgbouncer;Port=6432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Command Timeout=300;Maximum Pool Size=100;No Reset On Close=true;Application Name=truemain-api
      # Migrations bypass PgBouncer (session-scoped advisory lock; see DatabaseMigrator).
      ConnectionStrings__TrueMainMigrations: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Command Timeout=300;Application Name=truemain-migrator
      MongoLogging__ConnectionString: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/?authSource=admin
      Ops__ApiKey: ${OPS_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      mongo:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - truemain_dev_api_nuget:/root/.nuget/packages
    develop:
      watch:
        - action: sync
          path: ./backend/Api
          target: /workspace/Api
          ignore:
            - Api.csproj
            - bin/
            - obj/
        - action: sync
          path: ./backend/Core
          target: /workspace/Core
          ignore:
            - Core.csproj
            - bin/
            - obj/
        - action: sync
          path: ./backend/Data
          target: /workspace/Data
          ignore:
            - Data.csproj
            - bin/
            - obj/
        - action: rebuild
          path: ./backend/Api/Api.csproj
        - action: rebuild
          path: ./backend/Core/Core.csproj
        - action: rebuild
          path: ./backend/Data/Data.csproj
        - action: rebuild
          path: ./backend/Directory.Build.props
    networks:
      - truemain_dev_internal

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: truemain-dev-web
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      NUXT_API_BASE_URL: http://api:8080
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./web:/workspace/web
      - truemain_dev_web_node_modules:/workspace/web/node_modules
    develop:
      watch:
        - action: rebuild
          path: ./web/package.json
        - action: rebuild
          path: ./web/package-lock.json
    networks:
      - truemain_dev_internal

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.dev
    container_name: truemain-dev-admin
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      NUXT_OPS_API_BASE_URL: http://api:8080
      NUXT_OPS_KEY: ${OPS_API_KEY}
      NUXT_SESSION_PASSWORD: ${ADMIN_SESSION_PASSWORD}
      NUXT_ADMIN_USERNAME: ${ADMIN_USERNAME:-truemain}
      NUXT_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-truemain}
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3001:3000"
    volumes:
      - ./admin:/workspace/admin
      - truemain_dev_admin_node_modules:/workspace/admin/node_modules
    develop:
      watch:
        - action: rebuild
          path: ./admin/package.json
        - action: rebuild
          path: ./admin/package-lock.json
    networks:
      - truemain_dev_internal

  ingestor:
    build:
      context: ./backend
      dockerfile: Ingestor/Dockerfile.dev
    container_name: truemain-dev-ingestor
    restart: unless-stopped
    environment:
      DOTNET_ENVIRONMENT: Development
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
      ConnectionStrings__TrueMain: Host=pgbouncer;Port=6432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Command Timeout=300;Maximum Pool Size=40;No Reset On Close=true;Application Name=truemain-ingestor
      MongoLogging__ConnectionString: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/?authSource=admin
      Riot__ApiKey: ${RIOT_API_KEY}
      Job__Mode: ${INGESTOR_JOB_MODE:-Full}
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      mongo:
        condition: service_healthy
    volumes:
      - truemain_dev_ingestor_nuget:/root/.nuget/packages
    develop:
      watch:
        - action: sync
          path: ./backend/Ingestor
          target: /workspace/Ingestor
          ignore:
            - Ingestor.csproj
            - bin/
            - obj/
        - action: sync
          path: ./backend/Core
          target: /workspace/Core
          ignore:
            - Core.csproj
            - bin/
            - obj/
        - action: sync
          path: ./backend/Data
          target: /workspace/Data
          ignore:
            - Data.csproj
            - bin/
            - obj/
        - action: rebuild
          path: ./backend/Ingestor/Ingestor.csproj
        - action: rebuild
          path: ./backend/Core/Core.csproj
        - action: rebuild
          path: ./backend/Data/Data.csproj
        - action: rebuild
          path: ./backend/Directory.Build.props
    networks:
      - truemain_dev_internal

  pgadmin:
    image: dpage/pgadmin4:9.11
    container_name: truemain-dev-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - truemain_dev_pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - truemain_dev_internal

volumes:
  truemain_dev_db_data:
  truemain_dev_mongo_data:
  truemain_dev_pgadmin_data:
  truemain_dev_api_nuget:
  truemain_dev_ingestor_nuget:
  truemain_dev_web_node_modules:
  truemain_dev_admin_node_modules:

networks:
  truemain_dev_internal:
    driver: bridge
