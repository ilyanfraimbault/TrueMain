services:
  postgres:
    image: postgres:17.2
    container_name: truemain-postgres
    environment:
      POSTGRES_USER: truemain
      POSTGRES_PASSWORD: truemain
      POSTGRES_DB: truemain
    ports:
      - "5432:5432"
    volumes:
      - truemain_db_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:9.11
    container_name: truemain-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@truemain.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - truemain_pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      - postgres

volumes:
  truemain_db_data:
  truemain_pgadmin_data:
