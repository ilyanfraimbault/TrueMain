services:
  postgres:
    image: postgres:17.2
    container_name: truemain-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - truemain_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - truemain_internal

  # Transaction-pooling connection multiplexer in front of Postgres. The app
  # services connect here (pgbouncer:6432) instead of postgres:5432, so a small,
  # fixed set of real Postgres connections (default_pool_size) serves arbitrarily
  # large Npgsql pools. This is what keeps Postgres' max_connections from ever
  # being exhausted (fixes the recurring "53300 too many clients already", #461).
  # EF migrations must NOT pass through here — see the api's
  # ConnectionStrings__TrueMainMigrations (direct to Postgres).
  pgbouncer:
    image: edoburu/pgbouncer:v1.23.1-p3
    container_name: truemain-pgbouncer
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      # edoburu defaults LISTEN_PORT to 5432 (drop-in for postgres); pin it to
      # 6432 to match the apps' connection strings and the published port.
      LISTEN_PORT: "6432"
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "25"
      MIN_POOL_SIZE: "5"
      RESERVE_POOL_SIZE: "5"
      RESERVE_POOL_TIMEOUT: "3"
      # Read-only stats access (SHOW POOLS/STATS) for diagnostics. Deliberately
      # NOT admin_users: the app user must not be able to SUSPEND/KILL/SHUTDOWN
      # the pooler. admin_users defaults to the non-existent `postgres` role, so
      # the app credentials cannot run admin commands at all.
      STATS_USERS: ${POSTGRES_USER}
    healthcheck:
      # edoburu ships pg_isready; busybox `nc -z` is unreliable in this image.
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - truemain_internal

  mongo:
    image: mongo:8.0
    container_name: truemain-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
      # Bind to loopback only: the log/audit store must not be reachable from
      # other hosts on the network. App containers reach it over the compose
      # network ("mongo:27017"), which does not go through this published port.
      - "127.0.0.1:27017:27017"
    volumes:
      - truemain_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - truemain_internal

  api:
    build:
      context: ./backend
      dockerfile: Api/Dockerfile
    container_name: truemain-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Database__ApplyMigrationsOnStartup: "true"
      # Runtime queries go through PgBouncer (transaction pooling). No Reset On
      # Close=true: PgBouncer owns connection cleanup in transaction mode, so
      # Npgsql must not send DISCARD ALL on close.
      ConnectionStrings__TrueMain: Host=pgbouncer;Port=6432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Command Timeout=300;Maximum Pool Size=100;No Reset On Close=true;Application Name=truemain-api
      # Migrations bypass PgBouncer (session-scoped advisory lock; see DatabaseMigrator).
      ConnectionStrings__TrueMainMigrations: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Command Timeout=300;Application Name=truemain-migrator
      MongoLogging__ConnectionString: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/?authSource=admin
      Ops__ApiKey: ${OPS_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      mongo:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - truemain_internal

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: truemain-web
    restart: unless-stopped
    environment:
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      NUXT_API_BASE_URL: http://api:8080
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - truemain_internal

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: truemain-admin
    restart: unless-stopped
    environment:
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      NUXT_OPS_API_BASE_URL: http://api:8080
      NUXT_OPS_KEY: ${OPS_API_KEY}
      NUXT_SESSION_PASSWORD: ${ADMIN_SESSION_PASSWORD}
      NUXT_ADMIN_USERNAME: ${ADMIN_USERNAME:-truemain}
      NUXT_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-truemain}
    depends_on:
      api:
        condition: service_healthy
    ports:
      # Bind to loopback only: the admin dashboard is an internal tool reached
      # via the reverse proxy on the host, never directly from the public
      # internet. `3001:3000` would publish on 0.0.0.0.
      - "127.0.0.1:3001:3000"
    networks:
      - truemain_internal

  ingestor:
    build:
      context: ./backend
      dockerfile: Ingestor/Dockerfile
    container_name: truemain-ingestor
    restart: unless-stopped
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__TrueMain: Host=pgbouncer;Port=6432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Command Timeout=300;Maximum Pool Size=40;No Reset On Close=true;Application Name=truemain-ingestor
      MongoLogging__ConnectionString: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/?authSource=admin
      Riot__ApiKey: ${RIOT_API_KEY}
      Job__Mode: ${INGESTOR_JOB_MODE:-Full}
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - truemain_internal

  pgadmin:
    image: dpage/pgadmin4:9.11
    container_name: truemain-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - truemain_pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - truemain_internal

volumes:
  truemain_db_data:
  truemain_mongo_data:
  truemain_pgadmin_data:

networks:
  truemain_internal:
    driver: bridge
