<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Emerald tier fallback for the leaderboard rank emblem. Community
       Dragon's ranked-mini-crests/ ships every tier except Emerald (added
       2023) so we self-host this single SVG to keep the visual family
       consistent with the rest. Stylised wing pair + centre gem,
       coloured in the canonical Emerald palette. -->
  <defs>
    <linearGradient id="emWing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7FE0B5"/>
      <stop offset="100%" stop-color="#2E8B65"/>
    </linearGradient>
    <radialGradient id="emGem" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#A8F0CB"/>
      <stop offset="60%" stop-color="#48B98B"/>
      <stop offset="100%" stop-color="#1F6649"/>
    </radialGradient>
  </defs>
  <!-- Left wing: outer curve + inner notch. -->
  <path
    d="M 8 30 L 26 24 L 36 36 L 30 48 L 18 52 L 4 44 Z"
    fill="url(#emWing)"
    stroke="#1F6649"
    stroke-width="1.5"
    stroke-linejoin="round"
  />
  <!-- Right wing (mirrored). -->
  <path
    d="M 72 30 L 54 24 L 44 36 L 50 48 L 62 52 L 76 44 Z"
    fill="url(#emWing)"
    stroke="#1F6649"
    stroke-width="1.5"
    stroke-linejoin="round"
  />
  <!-- Centre gem: outer ring + inner highlight. -->
  <circle cx="40" cy="40" r="11" fill="#1F6649" stroke="#0F3829" stroke-width="1.5"/>
  <circle cx="40" cy="40" r="8" fill="url(#emGem)"/>
  <circle cx="38" cy="37" r="2" fill="#E8FBF1" opacity="0.7"/>
</svg>
