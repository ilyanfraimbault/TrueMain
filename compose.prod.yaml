services:
  postgres:
    image: postgres:17.2
    container_name: truemain-postgres
    restart: unless-stopped
    shm_size: "256m"
    # Disable parallel query: parallel workers allocate DSM segments in /dev/shm,
    # and concurrent aggregate queries exhausted it (53100: could not resize shared
    # memory segment / No space left on device), crashing the API and ingestor.
    command: ["postgres", "-c", "max_parallel_workers_per_gather=0"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - truemain_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - truemain_internal

  pgbouncer:
    image: edoburu/pgbouncer:v1.23.1-p3
    container_name: truemain-pgbouncer
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      LISTEN_PORT: "6432"
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "25"
      MIN_POOL_SIZE: "5"
      RESERVE_POOL_SIZE: "5"
      RESERVE_POOL_TIMEOUT: "3"
      STATS_USERS: ${POSTGRES_USER}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - truemain_internal

  mongo:
    image: mongo:8.0.24
    container_name: truemain-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - truemain_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - truemain_internal

  api:
    image: ghcr.io/ilyanfraimbault/truemain-api:latest
    container_name: truemain-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__TrueMain: Host=pgbouncer;Port=6432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Command Timeout=300;Maximum Pool Size=100;No Reset On Close=true;Application Name=truemain-api
      ConnectionStrings__TrueMainMigrations: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Command Timeout=300;Application Name=truemain-migrator
      Database__ApplyMigrationsOnStartup: "true"
      MongoLogging__ConnectionString: "mongodb://${MONGO_USER:?set MONGO_USER before deploying}:${MONGO_PASSWORD:?set MONGO_PASSWORD before deploying}@mongo:27017/?authSource=admin"
      Ops__ApiKey: "${OPS_API_KEY:?set OPS_API_KEY before deploying}"
      Cors__Origins__0: "https://truemain.lol"
      Cors__Origins__1: "https://www.truemain.lol"
      Cors__Origins__2: "https://admin.truemain.lol"
      MongoLogging__CrashFilePath: /home/app/crashes
    volumes:
      # Durable crash logs survive container recreation. Named volume so it inherits
      # the app-user ownership prepared in the image (a bind mount would not).
      - truemain_api_crashes:/home/app/crashes
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      mongo:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - truemain_internal

  web:
    image: ghcr.io/ilyanfraimbault/truemain-web:latest
    container_name: truemain-web
    restart: unless-stopped
    environment:
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      NUXT_API_BASE_URL: http://api:8080
      # Umami tracker (#728). The website id is created in the Umami UI after
      # the first deploy; the tracker stays disabled while it is empty.
      NUXT_PUBLIC_UMAMI_HOST: https://analytics.truemain.lol
      NUXT_PUBLIC_UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - truemain_internal

  admin:
    image: ghcr.io/ilyanfraimbault/truemain-admin:latest
    container_name: truemain-admin
    restart: unless-stopped
    environment:
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      NUXT_OPS_API_BASE_URL: http://api:8080
      NUXT_OPS_KEY: ${OPS_API_KEY}
      NUXT_SESSION_PASSWORD: "${ADMIN_SESSION_PASSWORD:?set ADMIN_SESSION_PASSWORD before deploying}"
      NUXT_ADMIN_USERNAME: ${ADMIN_USERNAME:-truemain}
      NUXT_ADMIN_PASSWORD: "${ADMIN_PASSWORD:?set a strong ADMIN_PASSWORD before deploying}"
      NUXT_SESSION_COOKIE_SECURE: "true"
      NUXT_TRUST_PROXY: "true"
      # Umami dashboard embed for the Analytics tab (#728). The share URL is
      # created in the Umami UI (website → Share); while empty the tab embeds
      # the app URL instead (requires an Umami login inside the iframe).
      NUXT_PUBLIC_UMAMI_URL: https://analytics.truemain.lol
      NUXT_PUBLIC_UMAMI_SHARE_URL: ${UMAMI_SHARE_URL:-}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - truemain_internal

  caddy:
    image: caddy:2-alpine
    container_name: truemain-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - truemain_caddy_data:/data
      - truemain_caddy_config:/config
    depends_on:
      - web
      - admin
      - umami
    networks:
      - truemain_internal

  # Self-hosted Umami analytics (#728) — visitor/session tracking for
  # truemain.lol, embedded by the admin portal's Analytics tab. Fully separate
  # from the TrueMain backend: own container, own database, no API coupling.
  umami-db:
    image: postgres:17.2
    container_name: truemain-umami-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: "${UMAMI_DB_PASSWORD:?set UMAMI_DB_PASSWORD before deploying}"
      POSTGRES_DB: umami
    volumes:
      - truemain_umami_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - truemain_internal

  umami:
    image: umamisoftware/umami:3.2.0
    container_name: truemain-umami
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: "${UMAMI_APP_SECRET:?set UMAMI_APP_SECRET before deploying}"
    depends_on:
      umami-db:
        condition: service_healthy
    networks:
      - truemain_internal

  ingestor:
    image: ghcr.io/ilyanfraimbault/truemain-ingestor:latest
    container_name: truemain-ingestor
    restart: unless-stopped
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__TrueMain: Host=pgbouncer;Port=6432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Command Timeout=300;Maximum Pool Size=40;No Reset On Close=true;Application Name=truemain-ingestor
      MongoLogging__ConnectionString: "mongodb://${MONGO_USER:?set MONGO_USER before deploying}:${MONGO_PASSWORD:?set MONGO_PASSWORD before deploying}@mongo:27017/?authSource=admin"
      Riot__ApiKey: ${RIOT_API_KEY}
      Job__Mode: ${INGESTOR_JOB_MODE:-Full}
      MongoLogging__CrashFilePath: /home/app/crashes
    volumes:
      - truemain_ingestor_crashes:/home/app/crashes
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - truemain_internal

volumes:
  truemain_db_data:
  truemain_mongo_data:
  truemain_caddy_data:
  truemain_caddy_config:
  truemain_api_crashes:
  truemain_ingestor_crashes:
  truemain_umami_db_data:

networks:
  truemain_internal:
    driver: bridge
